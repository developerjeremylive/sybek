<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sybek</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root { --bg: #0d0d0f; --bg2: #161618; --bg3: #1c1c1f; --border: #2e2e33; --accent: #d97706; --text: #e5e5e5; --text2: #a3a3a3; }
body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; height: 100vh; overflow: hidden; }
.app { display: flex; height: 100vh; }
.sidebar { width: 240px; background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; }
.sidebar-header { padding: 16px; border-bottom: 1px solid var(--border); }
.logo { font-size: 20px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
.logo-icon { width: 28px; height: 28px; background: linear-gradient(135deg, #d97706, #b45309); border-radius: 6px; display: flex; align-items: center; font-size: 16px; }
.nav { padding: 8px; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px; cursor: pointer; color: var(--text2); font-size: 14px; }
.nav-item:hover { background: rgba(255,255,255,0.05); }
.nav-item.active { background: var(--bg3); color: #fff; }
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.header { height: 50px; background: var(--bg2); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 16px; }
.header-title { font-size: 14px; font-weight: 600; }
.page { flex: 1; display: none; flex-direction: column; overflow: hidden; }
.page.active { display: flex; }
.chat-messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 16px; }
.message { display: flex; gap: 10px; max-width: 75%; }
.message.user { align-self: flex-end; flex-direction: row-reverse; }
.avatar { width: 28px; height: 28px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 14px; }
.message.assistant .avatar { background: linear-gradient(135deg, #d97706, #b45309); }
.message.user .avatar { background: linear-gradient(135deg, #6366f1, #4f46e5); }
.content { background: var(--bg3); padding: 10px 14px; border-radius: 10px; font-size: 14px; line-height: 1.5; }
.message.user .content { background: #2e2e33; }
.input-area { padding: 12px 16px; background: var(--bg2); border-top: 1px solid var(--border); }
.input-wrap { background: var(--bg3); border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; display: flex; gap: 10px; }
.input-wrap input { flex: 1; background: transparent; border: none; color: var(--text); font-size: 14px; outline: none; }
.input-wrap input::placeholder { color: #666; }
.send-btn { background: var(--accent); color: #fff; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 13px; }
.files-layout { display: flex; flex: 1; overflow: hidden; }
.files-sidebar { width: 200px; background: var(--bg2); border-right: 1px solid var(--border); padding: 12px; }
.files-sidebar h3 { font-size: 10px; color: #666; text-transform: uppercase; margin-bottom: 10px; }
.file-item { padding: 8px 10px; border-radius: 6px; cursor: pointer; color: var(--text2); font-size: 13px; }
.file-item:hover { background: rgba(255,255,255,0.05); }
.file-item.active { background: var(--bg3); color: #fff; }
.files-editor { flex: 1; display: flex; flex-direction: column; }
.editor-toolbar { padding: 10px 16px; background: var(--bg2); border-bottom: 1px solid var(--border); display: flex; gap: 8px; }
.editor-toolbar button { background: var(--bg3); color: var(--text2); border: 1px solid var(--border); padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; }
.editor-toolbar button.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.editor-toolbar span { font-size: 13px; color: var(--accent); margin-left: auto; }
.file-content { flex: 1; padding: 16px; }
.file-content textarea { width: 100%; height: 100%; background: #111; color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 14px; font-family: monospace; font-size: 13px; line-height: 1.6; resize: none; outline: none; }
.agents-page { flex: 1; padding: 16px; display: none; flex-direction: column; }
.agents-page.active { display: flex; }
.agents-page h2 { font-size: 16px; margin-bottom: 12px; }
.agents-page textarea { flex: 1; background: #111; color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 14px; font-family: monospace; font-size: 13px; line-height: 1.6; resize: none; outline: none; }
.agents-page button { align-self: flex-start; margin-top: 12px; background: var(--accent); color: #fff; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; }
</style>
</head>
<body>
<div class="app">
<div class="sidebar">
  <div class="sidebar-header"><div class="logo"><div class="logo-icon">⚡</div><span>Sybek</span></div></div>
  <div class="nav">
    <div class="nav-item active" data-p="chat"><span>💬</span><span>Chat</span></div>
    <div class="nav-item" data-p="files"><span>📁</span><span>Files</span></div>
    <div class="nav-item" data-p="agents"><span>🤖</span><span>Agents</span></div>
  </div>
</div>
<div class="main">
  <div id="page-chat" class="page active">
    <div class="header"><div class="header-title">Sybek Assistant</div></div>
    <div class="chat-messages" id="chatMessages">
      <div class="message assistant"><div class="avatar">⚡</div><div class="content">👋 Hi! I'm Sybek. How can I help you today?</div></div>
    </div>
    <div class="input-area"><div class="input-wrap"><input id="userMessage" placeholder="Message Sybek..." onkeypress="if(event.key==='Enter')sendMessage()"><button class="send-btn" onclick="sendMessage()">Send</button></div></div>
  </div>
  <div id="page-files" class="page">
    <div class="files-layout">
      <div class="files-sidebar">
        <h3>Files</h3>
        <div class="file-item active" data-f="AGENTS.md">📄 AGENTS.md</div>
        <div class="file-item" data-f="MEMORY.md">🧠 MEMORY.md</div>
        <div class="file-item" data-f="SOUL.md">❤️ SOUL.md</div>
        <div class="file-item" data-f="USER.md">👤 USER.md</div>
        <div class="file-item" data-f="TOOLS.md">🔧 TOOLS.md</div>
        <div class="file-item" data-f="IDENTITY.md">⚡ IDENTITY.md</div>
        <div class="file-item" data-f="HEARTBEAT.md">💓 HEARTBEAT.md</div>
      </div>
      <div class="files-editor">
        <div class="editor-toolbar"><button class="active" onclick="setView('edit')">Edit</button><button onclick="setView('preview')">Preview</button><span id="fileName">AGENTS.md</span></div>
        <div class="file-content"><textarea id="fileEditor"></textarea></div>
      </div>
    </div>
  </div>
  <div id="page-agents" class="agents-page">
    <h2>🤖 AGENTS.md Editor</h2>
    <textarea id="agentsEditor"></textarea>
    <button onclick="saveAgents()">Save Changes</button>
  </div>
</div>
</div>
<script>
const FILES = {
  'AGENTS.md': `# AGENTS.md - Your Workspace

This folder is home.

## First Run

If BOOTSTRAP.md exists, that's your birth certificate.

## Every Session

1. Read SOUL.md — this is who you are
2. Read USER.md — this is who you're helping

## Memory

- Daily notes: memory/YYYY-MM-DD.md
- Long-term: MEMORY.md
`,
  'MEMORY.md': `# MEMORY.md

## About Me
- Name: Sybek
- Vibe: Sharp, resourceful ⚡
`,
  'SOUL.md': `# SOUL.md - Who You Are

Be genuinely helpful. Have opinions.
`,
  'USER.md': `# USER.md

- Name: S
- Timezone: UTC
`,
  'TOOLS.md': `# TOOLS.md

Skills define tools.
`,
  'IDENTITY.md': `# IDENTITY.md

- Name: Sybek
`,
  'HEARTBEAT.md': `# HEARTBEAT.md

# Keep empty
`
};
let currentFile = 'AGENTS.md';

document.querySelectorAll('.nav-item').forEach(e => e.onclick = () => {
  document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
  e.classList.add('active');
  document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
  document.getElementById('page-' + e.dataset.p).classList.add('active');
});

document.querySelectorAll('.file-item').forEach(e => e.onclick = () => {
  document.querySelectorAll('.file-item').forEach(x => x.classList.remove('active'));
  e.classList.add('active');
  currentFile = e.dataset.f;
  document.getElementById('fileName').innerText = currentFile;
  document.getElementById('fileEditor').value = FILES[currentFile];
});

function setView(v) {
  document.querySelectorAll('.editor-toolbar button').forEach(x => x.classList.remove('active'));
  event.target.classList.add('active');
}

document.getElementById('agentsEditor').value = FILES['AGENTS.md'];
document.getElementById('fileEditor').value = FILES['AGENTS.md'];

function saveAgents() { FILES['AGENTS.md'] = document.getElementById('agentsEditor').value; alert('Saved!'); }

async function sendMessage() {
  const input = document.getElementById('userMessage');
  const msg = input.value.trim();
  if(!msg) return;
  const m = document.getElementById('chatMessages');
  m.innerHTML += '<div class="message user"><div class="avatar">👤</div><div class="content">'+msg+'</div></div>';
  m.innerHTML += '<div class="message assistant"><div class="avatar">⚡</div><div class="content">Thinking...</div></div>';
  m.scrollTop = m.scrollHeight;
  input.value = '';
  try {
    const r = await fetch('https://kilocode-proxy-live.developerjeremylive.workers.dev/v1/chat/completions', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({model:'kilocode/anthropic/claude-haiku-3.5', messages:[{role:'user',content:msg}]})});
    const d = await r.json();
    m.lastElementChild.querySelector('.content').innerText = d.choices?.[0]?.message?.content || 'No response';
  } catch(e) { m.lastElementChild.querySelector('.content').innerText = 'Error: ' + e.message; }
}
</script>
</body>
</html>
