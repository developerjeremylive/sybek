<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sybek - AI Workspace</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0f; color: #f4f4f5; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.hero { text-align: center; padding: 40px 20px; max-width: 700px; }
.logo { font-size: 64px; font-weight: 800; margin-bottom: 16px; background: linear-gradient(135deg, #f59e0b, #d97706); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.tagline { font-size: 18px; color: #a1a1aa; margin-bottom: 40px; line-height: 1.6; }
.buttons { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
.btn { padding: 14px 28px; font-size: 15px; font-weight: 600; border-radius: 10px; text-decoration: none; transition: all 0.2s; }
.btn-primary { background: linear-gradient(135deg, #d97706, #b45309); color: #fff; }
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(217, 119, 6, 0.4); }
.btn-secondary { background: rgba(255,255,255,0.08); color: #f4f4f5; border: 1px solid rgba(255,255,255,0.15); }
.btn-secondary:hover { background: rgba(255,255,255,0.12); }
.features { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-top: 60px; }
.feature { background: #13131a; padding: 20px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.06); text-align: left; }
.feature h3 { font-size: 14px; margin-bottom: 6px; color: #d97706; }
.feature p { font-size: 13px; color: #71717a; line-height: 1.5; }
</style>
</head>
<body>
<div class="hero">
  <div class="logo">⚡ Sybek</div>
  <p class="tagline">Your intelligent AI workspace with Chat, Files, and Agents.<br>Built with Cloudflare Workers.</p>
  <div class="buttons">
    <a href="/app.html" class="btn btn-primary">Open App →</a>
    <a href="https://sybek.pages.dev/" target="_blank" class="btn btn-secondary">Agent Playground ↗</a>
  </div>
  <div class="features">
    <div class="feature"><h3>💬 AI Chat</h3><p>Chat with AI models via Cloudflare Workers AI</p></div>
    <div class="feature"><h3>📁 Files</h3><p>Browse and edit workspace files with preview</p></div>
    <div class="feature"><h3>🤖 Agents</h3><p>Configure AI behavior through AGENTS.md</p></div>
  </div>
</div>
</body>
</html>
